<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#34C1D9" />

  <!-- Primary SEO Meta Tags -->
  <title>Zpluse Jobs Finder — Find Jobs, Apply Online, Remote Hiring</title>
  <meta name="title" content="Zpluse Jobs Finder — Find Jobs, Apply Online, Remote Hiring" />
  <meta name="description"
    content="Zpluse Jobs Finder connects job seekers with top employers. Browse 10,000+ job listings, apply in one click, and find remote or on-site employment opportunities near you." />
  <meta name="keywords"
    content="job finder, apply for jobs online, employment opportunities, remote hiring, job search, career, jobs near me, recruiter, hire talent, job portal India" />
  <meta name="robots" content="index, follow" />
  <meta name="language" content="English" />
  <meta name="author" content="Zpluse Jobs Finder" />
  <link rel="canonical" href="https://zplusejobs.com/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://zplusejobs.com/" />
  <meta property="og:title" content="Zpluse Jobs Finder — Find Jobs &amp; Hire Talent" />
  <meta property="og:description"
    content="Browse thousands of job opportunities. Apply online in one click. Connect job seekers with top employers across India and worldwide." />
  <meta property="og:image" content="https://zplusejobs.com/og-image.png" />
  <meta property="og:site_name" content="Zpluse Jobs Finder" />
  <meta property="og:locale" content="en_IN" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://zplusejobs.com/" />
  <meta name="twitter:title" content="Zpluse Jobs Finder — Find Jobs &amp; Hire Talent" />
  <meta name="twitter:description" content="Browse thousands of job opportunities. Apply online in one click." />
  <meta name="twitter:image" content="https://zplusejobs.com/og-image.png" />

  <!-- Performance: Preconnect to external origins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Google Fonts: Plus Jakarta Sans + Inter (modern, professional) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <!-- App Manifest & Icons -->
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <!-- JSON-LD: Organization Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Zpluse Jobs Finder",
      "url": "https://zplusejobs.com",
      "logo": "https://zplusejobs.com/logo192.png",
      "description": "Zpluse Jobs Finder connects job seekers with employers. Browse thousands of job opportunities and apply online.",
      "sameAs": []
    }
    </script>

  <!-- JSON-LD: WebSite + SearchAction -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Zpluse Jobs Finder",
      "url": "https://zplusejobs.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://zplusejobs.com/dashboard?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
</body>

</html>
